<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayat - Celestial Design</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-content">
    <header class="verse-header">
      <h1>Verse Showcase</h1>
    </header>
    <section class="stitch-layout">
      <div class="slide">
        <p class="verse">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
        <p class="translation">In the name of Allah, the Most Gracious, the Most Merciful.</p>
      </div>
    </section>
    <footer class="media-controller">
      <button id="play">Play</button>
      <input type="range" class="progress-bar" value="0">
      <span class="time">0:00</span>
    </footer>
  </div>
</body>
</html>
