<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayat - Celestial Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Noto+Serif&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main class="celestial-layout">
    <header class="header">
      <h1>Celestial Archive</h1>
    </header>
    <section class="slides">
    <div class="slide" id="slide-1">
      <p class="verse">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
      <p class="translation">In the name of Allah, the Most Gracious, the Most Merciful.</p>
    </div>
    <!-- Repeat similar structure for other verses -->
    <div class="media-player">
      <button id="play">Play</button>
      <input type="range" class="progress-bar" value="0">
      <span class="time">0:00</span>
    </div>
  </div>
</body>
</html>
